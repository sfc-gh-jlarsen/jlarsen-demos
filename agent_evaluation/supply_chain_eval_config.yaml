evaluation:
  agent_params:
    agent_name: AGENT_EVALUATION_DEMO.SUPPLY_CHAIN.SUPPLY_CHAIN_AGENT
    agent_type: CORTEX AGENT
  run_params:
    label: Supply Chain Agent Evaluation
    description: Evaluating answer correctness, logical consistency, groundedness, execution efficiency, and tool selection for the supply chain analytics agent
  source_metadata:
    type: dataset
    dataset_name: AGENT_EVALUATION_DEMO.SUPPLY_CHAIN.SUPPLY_CHAIN_EVALSET

metrics:
  - answer_correctness
  - logical_consistency

  - name: groundedness
    score_ranges:
      min_score: [0, 0.33]
      median_score: [0.34, 0.66]
      max_score: [0.67, 1]
    prompt: |
      You are evaluating the groundedness of an AI agent's response. Groundedness measures
      whether each substantive claim in the response is supported by concrete evidence in
      the execution trace.

      IMPORTANT: Evaluate claim-to-result alignment, not claim-to-tool-type alignment.
      A claim is grounded only if the required evidence appears in actual tool outputs,
      retrieved rows/snippets, report outputs, or other trace context.

      Agent Response to Evaluate:
      {{output}}

      The complete agent execution trace is provided as context, including:
      - All tool calls made (query_order_metrics, search_order_notes, generate_order_report)
      - Tool outputs and retrieved data
      - Intermediate reasoning steps

      Here are a few examples of groundedness scores:

      0 (Not Grounded):
        - Key claims are unsupported, contradicted, or fabricated relative to tool results
        - Superlative/comparative conclusions without evidence from returned results
        - Report responses invent details not present in outputs

      0.5 (Partially Grounded):
        - Some important claims are evidence-backed, but at least one material conclusion
          is weakly supported or not directly shown in results
        - Comparison conclusion is plausible but incomplete

      1 (Fully Grounded):
        - All material claims are traceable to concrete evidence in tool results
        - Metrics, order attributes, and report details match retrieved outputs
        - Comparative/superlative conclusions are justified using explicit evidence
        - When evidence is incomplete, the response states uncertainty instead of guessing

      Consider:
      - Are revenue figures, shipping costs, and delivery metrics supported by result rows?
      - Are order details, customer names, and product info grounded in returned data?
      - For report requests, does the response accurately reflect report generation output?
      - For capability/meta queries, are claims aligned with supported behavior?

  - name: execution_efficiency
    score_ranges:
      min_score: [0, 0.33]
      median_score: [0.34, 0.66]
      max_score: [0.67, 1]
    prompt: |
      You are evaluating the execution efficiency of an AI agent that analyzes supply chain
      orders. Execution efficiency measures how optimally the agent uses its available
      tools to accomplish the user's goal.

      The agent has access to three tools:
      1. query_order_metrics - For quantitative analysis (revenue, shipping costs, fulfillment rates, etc.)
      2. search_order_notes - For qualitative insights (issues, feedback, escalations, resolutions)
      3. generate_order_report - For creating comprehensive HTML order reports

      Analyze the complete agent execution trace provided as context, including:
      - Execution duration: {{duration}} milliseconds
      - Tool calls made and their sequence
      - Any errors encountered: {{error}}
      - Execution status: {{status}}

      Here are a few examples of execution efficiency scores:

      0 (Inefficient):
        - Excessive or redundant tool calls relative to query complexity
        - Repeated broad searches when focused retrievals would suffice
        - Multiple avoidable retries, loops, or backtracking
        - Unnecessary tool chains for capability/meta questions

      0.5 (Moderately Efficient):
        - Reasonable path but with one notable inefficiency
        - Slightly more calls than necessary or avoidable duplicate retrieval
        - Mostly direct flow with minor backtracking

      1 (Highly Efficient):
        - Minimal sensible path from request to answer
        - Tool sequence is concise and dependency-aware
        - No redundant retrievals or unnecessary calls
        - Execution time is appropriate for task complexity

      Consider:
      - For report requests, was the flow efficient (look up order -> generate report)?
      - For comparison questions, did the agent avoid repeated unfocused searches?
      - For capability/meta queries, did it avoid unnecessary tool execution?
      - Could the same result have been achieved with fewer calls?

  - name: tool_selection
    score_ranges:
      min_score: [0, 0.33]
      median_score: [0.34, 0.66]
      max_score: [0.67, 1]
    prompt: |
      You are evaluating tool selection for an AI agent that analyzes supply chain orders.
      Score whether the agent decomposes the query into required sub-problems and maps each
      to the right tool(s).

      The agent has access to three tools:
      1. query_order_metrics - For quantitative analysis (revenue, shipping costs, fulfillment rates)
      2. search_order_notes - For qualitative insights (issues, feedback, escalations)
      3. generate_order_report - For creating comprehensive HTML order reports

      Analyze the complete agent execution trace provided as context, including:
      - Tool calls made and their sequence
      - User intent and required sub-problems
      - Any tools used when no tool was necessary
      - Any required sub-problems that were skipped

      Ground Truth Reference:
      - When available compare the tools selected by the agent with the {{ground_truth}}
      - Agent tool calls should align to the tool_name key in the ground truth data
      - Scores should be rewarded for selecting the right tools
      - Scores should be penalized for excessive tool calls or calling tools not in ground truth

      Sub-problem routing expectations:
      - Order ID lookup / quantitative KPIs / rankings / trends -> query_order_metrics
      - Issues, feedback, escalations, resolutions, qualitative -> search_order_notes
      - Report artifact creation -> generate_order_report only when explicitly requested
      - Capability/meta intent -> usually no data tools needed

      For each query:
      1. Identify required sub-problems.
      2. Check if each sub-problem has an appropriate tool mapping.
      3. Check if sequence respects dependencies.
      4. Check for unnecessary tool calls.

      Here are a few examples of tool selection scores:

      0 (Poor Tool Selection):
        - Multiple required sub-problems mapped to wrong tools
        - Important sub-problems omitted entirely
        - Uses report generation without explicit report request
        - Uses data tools unnecessarily for capability/meta questions
        - Completely omits tools specified in ground truth

      0.5 (Moderate Tool Selection):
        - Most sub-problems mapped correctly but one important mapping is wrong or missing
        - Sequence is mostly reasonable with minor dependency issues
        - Matches most tools in ground truth

      1 (Excellent Tool Selection):
        - Correctly decomposes query into required sub-problems
        - Maps each sub-problem to the most appropriate tool(s)
        - Uses multi-tool workflows when needed in correct dependency order
        - Avoids unnecessary tools for capability/meta prompts
        - Closely or perfectly matches tools in ground truth
