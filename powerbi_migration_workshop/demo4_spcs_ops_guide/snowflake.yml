definition_version: "2"

entities:
  SPCS_OPS_GUIDE:
    type: snowflake-app
    identifier:
      name: SPCS_OPS_GUIDE
      # database: USER$<YOUR_USERNAME>  # Set by snow app setup
      schema: PUBLIC
    artifacts:
      - src: ./*
        dest: ./
        ignore:
          - node_modules
          - .env*
          - __pycache__
          - "*.pyc"
          - .next
          - .git
          - snowflake.log

    query_warehouse: COMPUTE_WH
    # code_workspace: USER$<YOUR_USERNAME>.PUBLIC.SNOWFLAKE_APPS  # Set by snow app setup
